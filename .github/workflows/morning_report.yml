name: Send Daily Morning Report

on:
  schedule:
    # Runs at 11:00 UTC (6:00 AM CST) every day
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows you to trigger it manually via GitHub UI for testing

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install google-genai google-api-python-client google-auth-oauthlib requests notion-client

    - name: Run Morning Report
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_JSON }}
      run: python main.py
